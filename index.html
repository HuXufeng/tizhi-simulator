<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>体制内模拟器 2.0 - 像素风策略养成</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/pixel-theme.css">
    <link rel="stylesheet" href="css/mobile-layout.css">
    
    <!-- 图标 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="pixel-status-bar" id="statusBar">
        <div class="pixel-status-left">
            <div>
                <div>第 <span id="currentDay" style="color:#ffcd75">1</span> 天</div>
                <div id="currentTime" style="font-size:6px;color:#c0c0c0">09:00</div>
            </div>
        </div>
        <div class="pixel-status-right">
            <span class="pixel-status-item" title="精力">
                ⚡<span id="energyValue">100</span>
            </span>
            <span class="pixel-status-item" title="健康">
                ❤️<span id="healthValue">100</span>
            </span>
            <span class="pixel-status-item" title="心态">
                🎭<span id="moodValue">100</span>
            </span>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="mobile-main" id="mainContent">
        <!-- 任务列表视图（默认） -->
        <div id="taskView" class="task-list">
            <!-- 任务卡片将通过 JS 动态生成 -->
        </div>

        <!-- 技能树视图 -->
        <div id="skillView" class="skill-tree-container" style="display:none;">
            <div class="skill-category">
                <div class="skill-category-title">
                    💼 业务能力 <span style="font-size:6px;color:#8b8b8b">Lv.<span id="workLevel">1</span></span>
                </div>
                <div class="skill-nodes" id="workSkills">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="skill-category">
                <div class="skill-category-title">
                    🤝 人际社交 <span style="font-size:6px;color:#8b8b8b">Lv.<span id="socialLevel">1</span></span>
                </div>
                <div class="skill-nodes" id="socialSkills">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="skill-category">
                <div class="skill-category-title">
                    🛡️ 心理素质 <span style="font-size:6px;color:#8b8b8b">Lv.<span id="psychologyLevel">1</span></span>
                </div>
                <div class="skill-nodes" id="psychologySkills">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="skill-category">
                <div class="skill-category-title">
                    🎭 政治智慧 <span style="font-size:6px;color:#8b8b8b">Lv.<span id="politicalLevel">1</span></span>
                </div>
                <div class="skill-nodes" id="politicalSkills">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="skill-category">
                <div class="skill-category-title">
                    ✨ 个人魅力 <span style="font-size:6px;color:#8b8b8b">Lv.<span id="charmLevel">1</span></span>
                </div>
                <div class="skill-nodes" id="charmSkills">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 角色关系视图 -->
        <div id="characterView" class="relationship-container" style="display:none;">
            <!-- 动态生成角色卡片 -->
        </div>

        <!-- 属性面板视图 -->
        <div id="statsView" class="stats-container" style="display:none;">
            <div class="stat-item">
                <div class="stat-header">
                    <span class="stat-name">⚡ 精力</span>
                    <span class="stat-value" id="energyDisplay">100/100</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-bar-fill energy" id="energyBar" style="width:100%"></div>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-header">
                    <span class="stat-name">❤️ 健康</span>
                    <span class="stat-value" id="healthDisplay">100/100</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-bar-fill health" id="healthBar" style="width:100%"></div>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-header">
                    <span class="stat-name">🎭 心态</span>
                    <span class="stat-value" id="moodDisplay">100/100</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-bar-fill mood" id="moodBar" style="width:100%"></div>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-header">
                    <span class="stat-name">🤝 归属感</span>
                    <span class="stat-value" id="belongingDisplay">50/100</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-bar-fill belonging" id="belongingBar" style="width:50%"></div>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-header">
                    <span class="stat-name">⭐ 声望</span>
                    <span class="stat-value" id="reputationDisplay">50/100</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-bar-fill reputation" id="reputationBar" style="width:50%"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 内心声音面板 -->
    <div class="pixel-voice-panel" id="voicePanel">
        <div class="pixel-voice-card ambition" id="voiceAmbition">
            <span class="pixel-voice-icon">🎯</span>
            <div class="pixel-voice-name ambition">野心家</div>
            <div class="pixel-progress" style="margin-top:4px;">
                <div class="pixel-progress-fill" id="ambitionBar" style="width:30%;background:linear-gradient(90deg, #b13e53, #d15373);"></div>
            </div>
        </div>
        <div class="pixel-voice-card goodperson" id="voiceGoodperson">
            <span class="pixel-voice-icon">😇</span>
            <div class="pixel-voice-name goodperson">老好人</div>
            <div class="pixel-progress" style="margin-top:4px;">
                <div class="pixel-progress-fill" id="goodpersonBar" style="width:30%;background:linear-gradient(90deg, #3b5dc9, #5b7dd9);"></div>
            </div>
        </div>
        <div class="pixel-voice-card cautious" id="voiceCautious">
            <span class="pixel-voice-icon">🛡️</span>
            <div class="pixel-voice-name cautious">谨慎派</div>
            <div class="pixel-progress" style="margin-top:4px;">
                <div class="pixel-progress-fill" id="cautiousBar" style="width:30%;background:linear-gradient(90deg, #38b764, #58d784);"></div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="pixel-nav" id="bottomNav">
        <button class="pixel-nav-item active" data-view="task" onclick="switchView('task')">
            <span class="pixel-nav-icon">📋</span>
            <span>任务</span>
        </button>
        <button class="pixel-nav-item" data-view="skill" onclick="switchView('skill')">
            <span class="pixel-nav-icon">🎯</span>
            <span>技能</span>
        </button>
        <button class="pixel-nav-item" data-view="character" onclick="switchView('character')">
            <span class="pixel-nav-icon">👥</span>
            <span>人物</span>
        </button>
        <button class="pixel-nav-item" data-view="stats" onclick="switchView('stats')">
            <span class="pixel-nav-icon">📊</span>
            <span>属性</span>
        </button>
    </nav>

    <!-- 模态框：事件详情 -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="eventTitle">事件标题</h2>
                <button class="modal-close" onclick="closeEventModal()">×</button>
            </div>
            <div class="modal-body">
                <p id="eventDesc" style="color:#f4f4f4;font-size:7px;line-height:1.6;margin-bottom:16px;"></p>
                <div id="eventOptions" class="event-options">
                    <!-- 动态生成选项 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- JavaScript -->
    <script src="js/data/events.js"></script>
    <script src="js/data/characters.js"></script>
    <script src="js/data/skills.js"></script>
    <script src="js/utils/SaveManager.js"></script>
    <script src="js/core/GameEngine.js"></script>
    <script src="js/core/SkillSystem.js"></script>
    <script src="js/core/InnerVoiceSystem.js"></script>
    <script src="js/core/EventSystem.js"></script>
    <script src="js/ui/UIManager.js"></script>
    
    <script>
        // 游戏初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🏛️ 体制内模拟器 2.0 启动中...');
            
            console.log('📦 检查模块加载状态:');
            console.log('  EVENT_DATABASE:', typeof EVENT_DATABASE);
            console.log('  CHARACTER_DATABASE:', typeof CHARACTER_DATABASE);
            console.log('  SKILL_DATABASE:', typeof SKILL_DATABASE);
            console.log('  SaveManager:', typeof SaveManager);
            console.log('  GameEngine:', typeof GameEngine);
            console.log('  SkillSystem:', typeof SkillSystem);
            console.log('  InnerVoiceSystem:', typeof InnerVoiceSystem);
            console.log('  EventSystem:', typeof EventSystem);
            console.log('  UIManager:', typeof UIManager);
            
            // 初始化游戏引擎
            if (typeof GameEngine !== 'undefined') {
                try {
                    GameEngine.init();
                } catch (e) {
                    console.error('❌ GameEngine初始化失败:', e);
                    alert('游戏初始化失败，请刷新页面重试');
                }
            } else {
                console.error('GameEngine 未加载');
                alert('GameEngine 未加载');
            }
        });

        // 切换视图
        function switchView(viewName) {
            const views = ['task', 'skill', 'character', 'stats'];
            const navItems = document.querySelectorAll('.pixel-nav-item');
            
            // 更新导航状态
            navItems.forEach(item => {
                item.classList.remove('active');
                if (item.dataset.view === viewName) {
                    item.classList.add('active');
                }
            });
            
            // 切换视图显示
            views.forEach(view => {
                const element = document.getElementById(view + 'View');
                if (element) {
                    element.style.display = view === viewName ? 'block' : 'none';
                }
            });
        }

        // 打开事件模态框
        function openEventModal(event) {
            const modal = document.getElementById('eventModal');
            const title = document.getElementById('eventTitle');
            const desc = document.getElementById('eventDesc');
            const options = document.getElementById('eventOptions');
            
            title.textContent = event.title;
            desc.textContent = event.description;
            
            // 生成选项
            let optionsHtml = '';
            event.options.forEach((option, index) => {
                optionsHtml += `
                    <div class="event-option" onclick="selectOption(${index})" data-option-index="${index}">
                        <div class="event-option-text">${option.text}</div>
                        <div class="event-option-effects">
                            ${generateEffectTags(option.effects)}
                        </div>
                    </div>
                `;
            });
            options.innerHTML = optionsHtml;
            
            // 存储当前事件
            window.currentEvent = event;
            
            // 显示模态框
            modal.classList.add('active');
        }

        // 关闭事件模态框
        function closeEventModal() {
            const modal = document.getElementById('eventModal');
            modal.classList.remove('active');
        }

        // 生成效果标签
        function generateEffectTags(effects) {
            let tags = '';
            for (const [key, value] of Object.entries(effects)) {
                if (value > 0) {
                    const icon = getEffectIcon(key);
                    tags += `<span class="effect-tag positive">${icon}+${value}</span>`;
                } else if (value < 0) {
                    const icon = getEffectIcon(key);
                    tags += `<span class="effect-tag negative">${icon}${value}</span>`;
                }
            }
            return tags;
        }

        // 获取效果图标
        function getEffectIcon(key) {
            const icons = {
                energy: '⚡',
                health: '❤️',
                mood: '🎭',
                reputation: '⭐',
                connections: '🤝',
                exp: '📈'
            };
            return icons[key] || '';
        }

        // 选择选项
        function selectOption(index) {
            if (typeof GameEngine !== 'undefined') {
                GameEngine.selectOption(index);
            }
            closeEventModal();
        }

        // 显示 Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 创建浮动反馈
        function createFloatFeedback(text, type, x, y) {
            const feedback = document.createElement('div');
            feedback.className = `pixel-float-feedback ${type}`;
            feedback.textContent = text;
            feedback.style.left = x + 'px';
            feedback.style.top = y + 'px';
            document.body.appendChild(feedback);
            
            setTimeout(() => {
                feedback.remove();
            }, 1500);
        }
    </script>
</body>
</html>
