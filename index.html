<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>体制内模拟器</title>
    <link rel="stylesheet" href="assets/css/pixel-fonts.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div id="game-container">
        <div id="intro-screen">
            <div class="intro-particles" id="intro-particles"></div>
            <div class="intro-content">
                <div class="intro-badge">像素文字决策游戏</div>
                <h1 class="intro-title pixel-text">
                    <span class="title-char" style="--i:0">体</span><span class="title-char" style="--i:1">制</span><span class="title-char" style="--i:2">内</span><span class="title-spacer"></span><span class="title-char" style="--i:3">模</span><span class="title-char" style="--i:4">拟</span><span class="title-char" style="--i:5">器</span>
                </h1>
                <p class="intro-subtitle">—— 一个基层公务员的生存指南 ——</p>
                <div class="intro-text">
                    <p>你叫<span class="highlight">林远</span>，今年25岁。</p>
                    <p>经过千军万马过独木桥的公务员考试，你终于被分配到了某市直机关办公室。</p>
                    <p>今天是报到第一天。站在机关大院门口，你深吸一口气……</p>
                    <p class="intro-hint">在这里，<span class="highlight">写材料</span>是基本功，<span class="highlight">开会</span>是日常，<span class="highlight">摸鱼</span>是技术活。</p>
                    <p class="intro-hint">至于升职？那得看<span class="highlight">命</span>。</p>
                </div>
                <button id="btn-start" class="pixel-btn intro-btn">
                    <span class="btn-icon">🏛️</span>
                    <span class="btn-text">踏入体制</span>
                    <span class="btn-arrow">→</span>
                </button>
                <div class="intro-footer">
                    <span>🎮 纯前端 · 无需安装 · 支持存档</span>
                </div>
            </div>
        </div>

        <div id="main-screen" style="display:none;">
            <div id="status-bar">
                <div class="status-row status-row-primary">
                    <div class="status-item status-day">
                        <span class="status-icon">📅</span>
                        <span id="stat-day">第1月</span>
                    </div>
                    <div class="status-item status-time">
                        <span class="status-icon">⏰</span>
                        <span id="stat-time">上午 9:00</span>
                    </div>
                    <div class="status-item status-title" id="stat-title">
                        <span class="status-icon">🏷️</span>
                        <span id="stat-title-text">新人</span>
                    </div>
                    <div class="status-item status-match" id="stat-match" style="display:none;">
                        <span class="status-icon">🎴</span>
                        <span id="stat-match-text">待配对</span>
                    </div>
                    <div class="status-item status-ngplus" id="stat-ngplus" style="display:none;">
                        <span class="status-icon">🔮</span>
                        <span id="stat-ngplus-text">周目</span>
                    </div>
                </div>
                <div class="status-row status-row-bars">
                    <div class="status-bar-item">
                        <span class="bar-label">⚡精力</span>
                        <div class="pixel-progress">
                            <div class="pixel-progress-bar bar-energy" id="bar-energy" style="width:100%"></div>
                        </div>
                        <span class="bar-value" id="val-energy">100</span>
                    </div>
                    <div class="status-bar-item">
                        <span class="bar-label">😰压力</span>
                        <div class="pixel-progress">
                            <div class="pixel-progress-bar bar-stress" id="bar-stress" style="width:0%"></div>
                        </div>
                        <span class="bar-value" id="val-stress">0</span>
                    </div>
                </div>
                <div class="status-row status-row-stats">
                    <div class="status-item">
                        <span class="status-icon">⭐</span>
                        <span id="stat-reputation">声望 50</span>
                    </div>
                    <div class="status-item">
                        <span class="status-icon">🤝</span>
                        <span id="stat-connections">人脉 20</span>
                    </div>
                    <div class="status-item">
                        <span class="status-icon">💰</span>
                        <span id="stat-money">3000元</span>
                    </div>
                    <div class="status-item">
                        <span class="status-icon">💼</span>
                        <span id="stat-position">科员</span>
                    </div>
                </div>
            </div>

            <div id="environment-hint" class="environment-hint"></div>

            <div id="message-area"></div>

            <div id="choice-area"></div>

            <button id="btn-slack" class="slack-btn" title="摸鱼">
                <span class="slack-icon">🐟</span>
                <span class="slack-label">摸鱼</span>
            </button>
        </div>

        <div id="modal-overlay" style="display:none;">
            <div id="modal-content"></div>
        </div>

        <div id="toast-container"></div>
    </div>

    <script src="assets/js/core/eventBus.js"></script>
    <script src="assets/js/core/gameState.js"></script>
    <script src="assets/js/core/timeSystem.js"></script>
    <script src="assets/js/core/saveSystem.js"></script>

    <script src="assets/js/systems/narratorSystem.js"></script>
    <script src="assets/js/systems/taskSystem.js"></script>
    <script src="assets/js/systems/characterSystem.js"></script>
    <script src="assets/js/systems/economySystem.js"></script>

    <script src="assets/js/systems/skillSystem.js"></script>

    <script src="assets/js/systems/eventSystem.js"></script>
    <script src="assets/js/systems/pixelSceneRenderer.js"></script>
    <script src="assets/js/systems/sceneCardRenderer.js"></script>
    <script src="assets/js/systems/charSpriteRenderer.js"></script>
    <script src="assets/js/systems/canvasSystem.js"></script>
    <script src="assets/js/systems/audioSystem.js"></script>

    <script src="assets/js/systems/characterCreationSystem.js"></script>
    <script src="assets/js/systems/needsSystem.js"></script>
    <script src="assets/js/systems/cardSystem.js"></script>

    <script src="assets/js/systems/achievementSystem.js"></script>
    <script src="assets/js/systems/miniGameSystem.js"></script>
    <script src="assets/js/systems/gameGoals.js"></script>
    <script src="assets/js/systems/endingSystem.js"></script>
    <script src="assets/js/systems/newGamePlusSystem.js"></script>

    <script src="assets/js/ui/mainUI.js"></script>
    <script src="assets/js/ui/dialogueUI.js"></script>
    <script src="assets/js/ui/skillTreeUI.js"></script>

    <script src="assets/js/game.js"></script>
</body>
</html>
